name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Rust checks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.95.0
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace --all-features
      - run: cargo build --workspace --release --locked
      - run: bash -n install.sh
      - run: ./install.sh --help
      - name: Test installer lifecycle and collision safety
        run: tests/install/unix-installer.sh target/release/skein
      - name: Test binary-first release acquisition and verification
        run: tests/install/unix-release-installer.sh target/release/skein

  security-audit:
    name: RustSec audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: taiki-e/install-action@44c6d64aa62cd779e873306675c7a58e86d6d532 # v2.62.49
        with:
          tool: cargo-audit@0.22.2
      - run: cargo audit --deny warnings

  platform-tests:
    name: Test on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15, windows-2025]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.95.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo test --workspace --all-features
      - if: runner.os != 'Windows'
        run: bash -n install.sh && ./install.sh --help
      - if: runner.os != 'Windows'
        name: Smoke-test isolated Unix installer lifecycle
        run: tests/install/unix-installer.sh target/debug/skein
      - if: runner.os != 'Windows'
        name: Test binary-first Unix release acquisition
        run: tests/install/unix-release-installer.sh target/debug/skein
      - if: runner.os == 'Windows'
        shell: pwsh
        run: ./install.ps1 -Help
      - if: runner.os == 'Windows'
        name: Smoke-test isolated Windows installer lifecycle
        shell: pwsh
        run: ./tests/install/windows-installer.ps1 -Binary target/debug/skein.exe
      - if: runner.os == 'Windows'
        name: Test binary-first Windows release acquisition
        shell: pwsh
        run: ./tests/install/windows-release-installer.ps1 -Binary target/debug/skein.exe

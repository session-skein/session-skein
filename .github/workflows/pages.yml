name: Documentation site

on:
  pull_request:
    paths:
      - ".github/workflows/pages.yml"
      - "site/**"
      - "docs/**"
      - "*.md"
      - "scripts/stage-pages.py"
      - "scripts/check-pages-links.py"
  push:
    branches: [main]
    paths:
      - ".github/workflows/pages.yml"
      - "site/**"
      - "docs/**"
      - "*.md"
      - "scripts/stage-pages.py"
      - "scripts/check-pages-links.py"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and validate Markdown site
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Stage canonical Markdown
        run: python scripts/stage-pages.py --output .pages-source
      - name: Build with GitHub Pages Jekyll
        uses: actions/jekyll-build-pages@44a6e6beabd48582f863aeeb6cb2151cc1716697 # v1
        with:
          source: ./.pages-source
          destination: ./_site
      - name: Check rendered internal links
        run: python scripts/check-pages-links.py _site
      - if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: ./_site

  deploy:
    name: Deploy GitHub Pages
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - id: deployment
        name: Deploy artifact
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
